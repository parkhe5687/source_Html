<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 움직이기</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .bigbox{
            width: 404px;
            /* flex 컨테이너 */
            display: flex;
            /* 404px 넘으면 다음 줄로 (2x2 배치) */
            flex-wrap: wrap;
        }
        .box{
            width: 200px;
            height: 200px;
            border: 1px solid black;
            display: flex;
        }
        .character{
            width: 100px;
            height: 100px;
        }
        #box1{
            background-color: blue;
            justify-content: center;
            align-items: center;
        }
        #box2{
            background-color: red;
            justify-content: flex-end;
            align-items: start;
        }
        #box3{
            background-color: yellow;
            justify-content: flex-start;
            align-items: flex-end;
        }
        #box4{
            background-color: orange;
            justify-content: flex-end;
            align-items: flex-end;
        }
    </style>
</head>
<body>
    <div class="bigbox">
        <div id="box1" class="box">
            <img src="images/luke.jpg" alt="" class="character" id="img01">
        </div>
        <div id="box2" class="box">
            <img src="images/luke.jpg" alt="" class="character" id="img02">
        </div>
        <div id="box3" class="box">
            <img src="images/luke.jpg" alt="" class="character" id="img03">
        </div>
        <div id="box4" class="box">
            <img src="images/luke.jpg" alt="" class="character" id="img04"> 
        </div>
    </div>
</body>
</html>
